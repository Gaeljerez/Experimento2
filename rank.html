<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Juegos de Terror</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0b0b0b;
            color: #fff;
        }

        header {
            text-align: center;
            padding: 20px;
            background: #1a0000;
            border-bottom: 2px solid red;
        }

        header h1 {
            color: red;
            margin: 0;
        }

        .container {
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #111;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            text-align: center;
        }

        th {
            background-color: #1a0000;
            color: red;
        }

        tr {
            border-bottom: 1px solid #333;
        }

        tr:hover {
            background-color: #1a1a1a;
        }

        .top1 {
            background-color: #330000;
            color: gold;
            font-weight: bold;
        }

        .top2 {
            background-color: #2a2a2a;
            color: silver;
        }

        .top3 {
            background-color: #1f1f1f;
            color: #cd7f32;
        }

        img {
            width: 80px;
            border-radius: 5px;
        }

        footer {
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            background-color: #111;
            border-top: 1px solid red;
        }
    </style>
</head>
<body>

<header>
    <h1>👻 Ranking de Juegos de Terror</h1>
    <p>Los más aterradores de todos los tiempos</p>
</header>

<div class="container">
    <table>
        <thead>
            <tr>
                <th>Posición</th>
                <th>Juego</th>
                <th>Imagen</th>
                <th>Año</th>
                <th>Puntuación</th>
            </tr>
        </thead>
        <tbody>
            <tr class="top1">
                <td>🥇 1</td>
                <td>Resident Evil 7</td>
                <td><img src="https://via.placeholder.com/80" alt=""></td>
                <td>2017</td>
                <td>9.5</td>
            </tr>

            <tr class="top2">
                <td>🥈 2</td>
                <td>Silent Hill 2</td>
                <td><img src="https://via.placeholder.com/80" alt=""></td>
                <td>2001</td>
                <td>9.4</td>
            </tr>

            <tr class="top3">
                <td>🥉 3</td>
                <td>Outlast</td>
                <td><img src="https://via.placeholder.com/80" alt=""></td>
                <td>2013</td>
                <td>9.0</td>
            </tr>

            <tr>
                <td>4</td>
                <td>Amnesia: The Dark Descent</td>
                <td><img src="https://via.placeholder.com/80" alt=""></td>
                <td>2010</td>
                <td>8.8</td>
            </tr>

            <tr>
                <td>5</td>
                <td>The Evil Within</td>
                <td><img src="https://via.placeholder.com/80" alt=""></td>
                <td>2014</td>
                <td>8.5</td>
            </tr>
        </tbody>
    </table>
</div>

<footer>
    <p>© 2026 Ranking de Terror 🎮</p>
</footer>

</body>
</html>
